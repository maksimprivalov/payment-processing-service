<div class="container">

  <div class="topbar">
    <h2>PPS Dashboard</h2>

    <div class="actions">
      <button (click)="goToList()">Accounts</button>
      <button (click)="goToCreate()">Create account</button>
      <button (click)="goToTransfer()">Transfer</button>
      <button (click)="goToTopup()">Top up</button>
      <button (click)="logout()">Logout</button>
    </div>
  </div>

  <!-- ================= LIST ================= -->
  <div *ngIf="currentView === 'list'" class="card">
    <h3>Your accounts</h3>

    <div *ngFor="let acc of accounts" class="account-row">
        <span>
        {{ acc.currency }} — {{ acc.balance }}
        <br>
        <small class="account-id">ID: {{ acc.id }}</small>
        </span>
      <button (click)="showTransactions(acc.id)">Transactions</button>
    </div>
  </div>

  <!-- ================= CREATE ================= -->
  <app-create-account *ngIf="currentView === 'create'"></app-create-account>

  <!-- ================= TRANSFER ================= -->
  <div *ngIf="currentView === 'transfer'" class="card">
      <h3>Transfer</h3>

    <div *ngIf="!accounts?.length" class="empty">
        No accounts available
    </div>

    <ng-container *ngIf="accounts?.length">

        <label>From account</label>
        <select [(ngModel)]="fromAccount">
        <option value="" disabled>Select account</option>
        <option *ngFor="let acc of accounts" [value]="acc.id">
            {{ acc.currency }} — {{ acc.id }}
        </option>
        </select>

        <label>To account ID</label>
        <input placeholder="Recipient account id" [(ngModel)]="toAccount">

        <label>Amount</label>
        <input type="number" placeholder="Amount" [(ngModel)]="transferAmount">

        <button (click)="transfer()">Send</button>

    </ng-container>

    <p class="success" *ngIf="transferSuccess">{{ transferSuccess }}</p>
    <p class="error" *ngIf="transferError">{{ transferError }}</p>
  </div>

  <!-- ================= TOP UP ================= -->
    <div *ngIf="currentView === 'topup'" class="card">
    <h3>Top up balance</h3>

    <div *ngIf="!accounts?.length" class="empty">
        No accounts available
    </div>

    <ng-container *ngIf="accounts?.length">

        <select [(ngModel)]="topupAccount">
        <option value="" disabled selected>Select account</option>
        <option *ngFor="let acc of accounts" [value]="acc.id">
            {{ acc.currency }} — {{ acc.id }}
        </option>
        </select>

        <input
        type="number"
        placeholder="Amount"
        [(ngModel)]="topupAmount"
        >

        <button (click)="topUp()" [disabled]="topupLoading">
        {{ topupLoading ? 'Processing...' : 'Top up' }}
        </button>

        <p class="success" *ngIf="topupSuccess">{{ topupSuccess }}</p>
        <p class="error" *ngIf="topupError">{{ topupError }}</p>

    </ng-container>
    </div>

  <!-- ================= TRANSACTIONS ================= -->
  <app-transactions
    *ngIf="currentView === 'transactions'"
    [accountId]="selectedForTransactions">
  </app-transactions>

</div>
